version: "3.8"

services:
  srs:
    image: ossrs/srs:5
    container_name: srs_aoe
    restart: always
    ports:
      - "1935:1935"
      - "8080:8080"
      - "1985:1985"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
      - aoe_record_vol:/usr/local/srs/objs/nginx/html/record

  web:
    build: .
    container_name: web_aoe
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - aoe_record_vol:/usr/local/srs/objs/nginx/html/record
    environment:
      - RECORD_DIR=/usr/local/srs/objs/nginx/html/record
    depends_on:
      - srs

volumes:
  aoe_record_vol:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/playback/record' # Khớp với volume host của bạn
