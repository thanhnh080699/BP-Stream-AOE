services:
  srs:
    image: ossrs/srs:latest
    container_name: srs-server
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
      - srs_data:/usr/local/srs/objs/nginx/html/dvr
    command: ["./objs/srs", "-c", "conf/srs.conf"]
    restart: always

  worker:
    build: ./worker
    container_name: srs-worker
    volumes:
      - srs_data:/data
    environment:
      - DATA_DIR=/data
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=aoe_scoreboard
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  dashboard:
    build: ./web
    container_name: srs-dashboard
    ports:
      - "83:80"
    volumes:
      - srs_data:/data
    depends_on:
      - srs
      - worker
    restart: always

volumes:
  srs_data:
    driver: local
    # production only
    # driver_opts:
    #   type: 'none'
    #   o: 'bind'
    #   device: '/stream/data'

